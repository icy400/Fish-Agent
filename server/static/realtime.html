<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实时监测 — Fish Agent</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
  <a href="/">文件列表</a>
  <a href="/upload.html">上传文件</a>
  <a href="/realtime.html" class="active">实时监测</a>
</nav>

<div class="container">
  <div class="header"><h1>实时鱼声监测</h1></div>

  <div class="card realtime-controls">
    <input id="session-name" value="pond-a" placeholder="监测名称">
    <button class="btn btn-primary" id="refresh-btn">刷新采集端</button>
    <span id="selected-client" class="session-chip">未选择采集端</span>
  </div>

  <div class="card">
    <h2>采集端列表</h2>
    <div class="seg-scroll">
      <table>
        <thead>
          <tr>
            <th>client_id</th>
            <th>状态</th>
            <th>在线</th>
            <th>会话</th>
            <th>待上传</th>
            <th>最近心跳</th>
            <th>消息</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="clients-body"><tr><td colspan="8" class="empty">暂无采集端，请先启动 Windows Agent</td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <h2>会话历史</h2>
    <div class="seg-scroll">
      <table>
        <thead>
          <tr>
            <th>会话</th>
            <th>名称</th>
            <th>状态</th>
            <th>开始时间</th>
            <th>停止时间</th>
            <th>密度</th>
            <th>投喂建议</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="sessions-body"><tr><td colspan="8" class="empty">请选择采集端</td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="label">会话状态</div><div class="value" id="session-status">未开始</div></div>
    <div class="stat-card"><div class="label">连接状态</div><div class="value" id="health-status">等待</div></div>
    <div class="stat-card"><div class="label">60秒鱼声密度</div><div class="value fish" id="density">0%</div></div>
    <div class="stat-card"><div class="label">数据完整度</div><div class="value" id="completeness">0%</div></div>
    <div class="stat-card"><div class="label">投喂建议</div><div class="value high" id="feeding">-</div></div>
  </div>

  <div class="card">
    <h2>最近 30 个分片</h2>
    <div class="timeline realtime-timeline" id="timeline"></div>
  </div>

  <div class="card">
    <h2>分片分析</h2>
    <div class="seg-scroll">
      <table>
        <thead>
          <tr><th>序号</th><th>时间</th><th>状态</th><th>预测</th><th>置信度</th><th>鱼声概率</th><th>密度</th><th>建议</th></tr>
        </thead>
        <tbody id="latest-body"><tr><td colspan="8" class="empty">暂无实时分片</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script>
let selectedClientId = localStorage.getItem('realtimeClientId') || '';
let sessionId = Number(localStorage.getItem('realtimeSessionId') || 0);
let clients = [];
let sessions = [];
let timer = null;

function escapeHtml(value) {
  const div = document.createElement('div');
  div.textContent = value == null ? '' : String(value);
  return div.innerHTML;
}

function pct(value) {
  return `${Math.round((Number(value) || 0) * 100)}%`;
}

function setSelectedClient(text) {
  document.getElementById('selected-client').textContent = text;
}

function selectedClientLabel() {
  if (!selectedClientId) return '未选择采集端';
  return sessionId ? `${selectedClientId} | 会话 #${sessionId}` : selectedClientId;
}

async function loadClients() {
  try {
    const res = await fetch('/api/realtime/clients');
    if (!res.ok) return;
    const data = await res.json();
    clients = data.clients || [];
    renderClients(clients);
    if (!selectedClientId && clients.length) {
      viewClient(clients[0].client_id, clients[0].current_session_id);
    } else {
      setSelectedClient(selectedClientLabel());
    }
  } catch (e) {
    document.getElementById('clients-body').innerHTML = '<tr><td colspan="8" class="empty">采集端加载失败</td></tr>';
  }
}

function renderClients(rows) {
  const body = document.getElementById('clients-body');
  if (!rows.length) {
    body.innerHTML = '<tr><td colspan="8" class="empty">暂无采集端，请先启动 Windows Agent</td></tr>';
    return;
  }
  body.innerHTML = rows.map((client, index) => `
    <tr class="${client.client_id === selectedClientId ? 'selected-row' : ''}">
      <td>${escapeHtml(client.client_id || '-')}</td>
      <td>${escapeHtml(client.effective_status || client.status || '-')}</td>
      <td>${client.online ? '在线' : '离线'}</td>
      <td>${client.current_session_id || '-'}</td>
      <td>${Number(client.pending_chunks || 0) + Number(client.failed_retryable_chunks || 0)}</td>
      <td>${escapeHtml(client.last_heartbeat_at || '-')}</td>
      <td>${escapeHtml(client.message || '-')}</td>
      <td class="actions">
        <button class="btn btn-sm btn-primary" onclick="startClientByIndex(${index})">开始</button>
        <button class="btn btn-sm btn-danger" onclick="stopClientByIndex(${index})">停止</button>
        <button class="btn btn-sm" onclick="viewClientByIndex(${index})">查看</button>
      </td>
    </tr>
  `).join('');
}

function viewClientByIndex(index) {
  const client = clients[index];
  if (!client) return;
  viewClient(client.client_id, client.current_session_id);
}

function viewClient(clientId, currentSessionId) {
  selectedClientId = clientId || '';
  sessionId = Number(currentSessionId || 0);
  localStorage.setItem('realtimeClientId', selectedClientId);
  if (sessionId) {
    localStorage.setItem('realtimeSessionId', String(sessionId));
  } else {
    localStorage.removeItem('realtimeSessionId');
  }
  setSelectedClient(selectedClientLabel());
  loadSessions();
  pollSession();
}

async function loadSessions() {
  if (!selectedClientId) {
    renderSessions([]);
    return;
  }
  try {
    const res = await fetch(`/api/realtime/clients/${encodeURIComponent(selectedClientId)}/sessions?limit=20`);
    if (!res.ok) return;
    const data = await res.json();
    sessions = data.sessions || [];
    renderSessions(sessions);
  } catch (e) {
    document.getElementById('sessions-body').innerHTML = '<tr><td colspan="8" class="empty">会话历史加载失败</td></tr>';
  }
}

function renderSessions(rows) {
  const body = document.getElementById('sessions-body');
  if (!selectedClientId) {
    body.innerHTML = '<tr><td colspan="8" class="empty">请选择采集端</td></tr>';
    return;
  }
  if (!rows.length) {
    body.innerHTML = '<tr><td colspan="8" class="empty">暂无会话历史</td></tr>';
    return;
  }
  body.innerHTML = rows.map((session, index) => `
    <tr class="${Number(session.id) === Number(sessionId) ? 'selected-row' : ''}">
      <td>#${Number(session.id) || '-'}</td>
      <td>${escapeHtml(session.name || '-')}</td>
      <td>${escapeHtml(session.status || '-')}</td>
      <td>${escapeHtml(session.started_at || session.created_at || '-')}</td>
      <td>${escapeHtml(session.stopped_at || '-')}</td>
      <td>${pct(session.density_60s)}</td>
      <td>${escapeHtml(session.feeding_message || '-')}</td>
      <td class="actions">
        <button class="btn btn-sm" onclick="viewSessionByIndex(${index})">查看</button>
        <button class="btn btn-sm btn-danger" onclick="deleteSessionByIndex(${index})" ${session.status === 'stopped' ? '' : 'disabled'}>删除</button>
      </td>
    </tr>
  `).join('');
}

function viewSessionByIndex(index) {
  const session = sessions[index];
  if (!session) return;
  viewSession(session.id);
}

function viewSession(id) {
  sessionId = Number(id || 0);
  if (sessionId) {
    localStorage.setItem('realtimeSessionId', String(sessionId));
  } else {
    localStorage.removeItem('realtimeSessionId');
  }
  setSelectedClient(selectedClientLabel());
  renderSessions(sessions);
  pollSession();
}

async function deleteSessionByIndex(index) {
  const session = sessions[index];
  if (!session) return;
  await deleteSession(session.id);
}

async function deleteSession(id) {
  if (!confirm(`确认删除会话 #${id} 及其采集音频？`)) return;
  const res = await fetch(`/api/realtime/sessions/${id}`, {method: 'DELETE'});
  if (!res.ok) {
    document.getElementById('health-status').textContent = res.status === 409 ? '请先停止会话再删除' : '删除会话失败';
    return;
  }
  if (Number(sessionId) === Number(id)) {
    sessionId = 0;
    localStorage.removeItem('realtimeSessionId');
    resetSessionPanel();
  }
  await loadSessions();
  await loadClients();
}

async function startClientByIndex(index) {
  const client = clients[index];
  if (!client) return;
  await startClient(client.client_id);
}

async function startClient(clientId = selectedClientId) {
  if (!clientId) return;
  const res = await fetch(`/api/realtime/clients/${encodeURIComponent(clientId)}/commands/start`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      session_name: document.getElementById('session-name').value,
      chunk_duration: 2.0
    })
  });
  if (!res.ok) return;
  const data = await res.json();
  viewClient(clientId, data.session_id);
  document.getElementById('health-status').textContent = data.command_status === 'already_running' ? '采集中' : '等待采集端执行开始命令';
  await pollNow();
}

async function stopClientByIndex(index) {
  const client = clients[index];
  if (!client) return;
  await stopClient(client.client_id);
}

async function stopClient(clientId = selectedClientId) {
  if (!clientId) return;
  const res = await fetch(`/api/realtime/clients/${encodeURIComponent(clientId)}/commands/stop`, {method: 'POST'});
  if (!res.ok) return;
  const data = await res.json();
  if (data.session_id) {
    viewClient(clientId, data.session_id);
  }
  document.getElementById('health-status').textContent = data.command_status === 'no_active_session' ? '没有运行中的会话' : '等待采集端执行停止命令';
  await pollNow();
}

async function pollNow() {
  await loadClients();
  await loadSessions();
  await pollSession();
}

async function pollSession() {
  if (!sessionId) {
    resetSessionPanel();
    return;
  }
  await Promise.all([loadSummary(), loadSegments()]);
}

function startPolling() {
  stopPolling();
  timer = setInterval(pollNow, 2000);
}

function stopPolling() {
  if (timer) clearInterval(timer);
  timer = null;
}

function resetSessionPanel() {
  document.getElementById('session-status').textContent = '未开始';
  document.getElementById('health-status').textContent = selectedClientId ? '等待采集命令' : '等待';
  document.getElementById('density').textContent = '0%';
  document.getElementById('completeness').textContent = '0%';
  document.getElementById('feeding').textContent = '-';
  document.getElementById('timeline').replaceChildren();
  document.getElementById('latest-body').innerHTML = '<tr><td colspan="8" class="empty">暂无实时分片</td></tr>';
}

async function loadSummary() {
  try {
    const res = await fetch(`/api/realtime/sessions/${sessionId}`);
    if (!res.ok) return;
    const s = await res.json();
    const health = s.health || {};
    const feeding = s.feeding || {};
    document.getElementById('session-status').textContent = s.status || '-';
    document.getElementById('health-status').textContent = health.message || s.health_message || s.health_status || '-';
    document.getElementById('density').textContent = pct(s.density_60s);
    document.getElementById('completeness').textContent = pct(s.completeness_60s);
    document.getElementById('feeding').textContent = `${feeding.level || s.feeding_level || '-'} ${feeding.amount_kg || s.feeding_amount || 0}kg`;
    setSelectedClient(selectedClientLabel());
  } catch (e) {
    document.getElementById('health-status').textContent = '连接异常';
  }
}

async function loadSegments() {
  try {
    const res = await fetch(`/api/realtime/sessions/${sessionId}/segments?limit=30`);
    if (!res.ok) return;
    const data = await res.json();
    renderTimeline(data.segments || []);
    renderTable(data.segments || []);
  } catch (e) {
    document.getElementById('latest-body').innerHTML = '<tr><td colspan="8" class="empty">实时数据加载失败</td></tr>';
  }
}

function renderTimeline(rows) {
  const timeline = document.getElementById('timeline');
  timeline.replaceChildren();
  for (const row of rows) {
    const cls = row.status === 'missing' ? 'bar-missing' : row.status === 'error' ? 'bar-error' : row.predicted_class === 'fish' ? 'bar-fish' : 'bar-bg';
    const title = `${row.sequence} ${row.status || ''} ${row.predicted_class || ''} ${pct(row.fish_probability)}`;
    const bar = document.createElement('div');
    bar.className = `bar ${cls}`;
    bar.title = title;
    timeline.appendChild(bar);
  }
}

function renderTable(rows) {
  const body = document.getElementById('latest-body');
  if (!rows.length) {
    body.innerHTML = '<tr><td colspan="8" class="empty">暂无实时分片</td></tr>';
    return;
  }
  body.innerHTML = rows.map(row => `
    <tr>
      <td>${Number(row.sequence) || '-'}</td>
      <td>${escapeHtml(row.captured_at || '-')}</td>
      <td>${escapeHtml(row.status || '-')}</td>
      <td>${escapeHtml(row.predicted_class || '-')}</td>
      <td>${pct(row.confidence)}</td>
      <td>${pct(row.fish_probability)}</td>
      <td>${pct(row.density_60s)}</td>
      <td>${escapeHtml(row.feeding_message || row.message || '-')}</td>
    </tr>
  `).join('');
}

document.getElementById('refresh-btn').addEventListener('click', pollNow);

setSelectedClient(selectedClientLabel());
pollNow();
startPolling();
</script>
</body>
</html>
